name: ci

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test-and-eval:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Unit tests
        run: uv run pytest -q

      - name: Build retrieval index
        run: uv run ask-my-docs build-index --docs-dir data/docs --index-dir artifacts/index

      - name: CI-gated evaluation
        run: |
          uv run ask-my-docs evaluate \
            --dataset data/eval/qa.yaml \
            --index-dir artifacts/index \
            --thresholds configs/eval_thresholds.yaml \
            --gate
